  <!-- ============ DOCUMENT ============ -->
  <main>
    <section class="spread doc-spread" id="about">
      <div class="wrap">
        <div class="guides" aria-hidden="true"><div class="cols"></div><div class="rows"></div><div class="mline l"></div><div class="mline r"></div></div>
        <div class="grid">
          <div class="band reveal">
            <div class="section__rail col-rail"><span class="rail-label" id="about-label">About</span></div>
            <div class="section__body col-body">
              <p class="lead" id="about-lead"></p>
              <div class="about__body" id="about-body"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="spread doc-spread" id="group-0">
      <div class="wrap">
        <div class="guides" aria-hidden="true"><div class="cols"></div><div class="rows"></div><div class="mline l"></div><div class="mline r"></div></div>
        <div class="grid">
          <div class="band reveal">
            <div class="section__rail col-rail"><span class="rail-label" id="group-0-label">Team</span></div>
            <div class="section__body col-body">
              <div class="staff__list" id="group-0-list"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="spread doc-spread" id="group-1">
      <div class="wrap">
        <div class="guides" aria-hidden="true"><div class="cols"></div><div class="rows"></div><div class="mline l"></div><div class="mline r"></div></div>
        <div class="grid">
          <div class="band reveal">
            <div class="section__rail col-rail"><span class="rail-label" id="group-1-label">Board</span></div>
            <div class="section__body col-body">
              <div class="staff__list" id="group-1-list"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
